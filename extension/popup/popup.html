<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Klip4ge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      min-height: 480px;
      background: #0F1117;
      color: #E8E8ED;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, rgba(0,191,255,0.12), rgba(147,112,219,0.12));
      border-bottom: 1px solid #2A2D3A;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-mark {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #00BFFF, #9370DB);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 900;
      color: white;
    }
    .logo-text {
      font-size: 16px;
      font-weight: 800;
      background: linear-gradient(135deg, #00BFFF, #9370DB);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .settings-btn {
      background: transparent;
      border: none;
      color: #8B8D97;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.15s;
    }
    .settings-btn:hover { color: #E8E8ED; }

    /* ── Auth wall ── */
    #auth-wall {
      padding: 24px 16px;
      text-align: center;
    }
    #auth-wall h2 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    #auth-wall p  { color: #8B8D97; font-size: 12px; margin-bottom: 16px; }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 10px 16px;
      background: linear-gradient(135deg, #00BFFF, #9370DB);
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: filter 0.15s, transform 0.15s;
    }
    .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ── Save form ── */
    #save-form { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }

    .field label {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #8B8D97;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .field input,
    .field textarea,
    .field select {
      width: 100%;
      background: #1A1D27;
      border: 1px solid #2A2D3A;
      color: #E8E8ED;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      font-family: inherit;
      transition: border-color 0.15s;
      outline: none;
    }
    .field input:focus,
    .field textarea:focus,
    .field select:focus { border-color: #00BFFF; }
    .field textarea { resize: none; height: 56px; }
    .field select option { background: #1A1D27; }

    /* Thumbnail preview */
    #thumb-wrap {
      width: 100%;
      height: 80px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #2A2D3A;
      background: #1A1D27;
      display: none;
    }
    #thumb-wrap img { width: 100%; height: 100%; object-fit: cover; }

    /* Tags */
    .tags-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid #2A2D3A;
      color: #8B8D97;
      cursor: pointer;
      transition: all 0.12s;
    }
    .tag:hover { border-color: #00BFFF; color: #00BFFF; }

    /* Status feedback */
    #status {
      padding: 10px 16px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    #status.success { color: #10B981; }
    #status.error   { color: #EF4444; }

    /* User bar */
    #user-bar {
      padding: 6px 16px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: #8B8D97;
    }
    #user-bar .sign-out {
      background: transparent;
      border: none;
      color: #8B8D97;
      cursor: pointer;
      font-size: 11px;
      text-decoration: underline;
    }
    #user-bar .sign-out:hover { color: #EF4444; }

    /* Footer */
    .footer {
      border-top: 1px solid #2A2D3A;
      padding: 8px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer a {
      font-size: 10px;
      color: #8B8D97;
      text-decoration: none;
    }
    .footer a:hover { color: #00BFFF; }

    /* Spinner */
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Shortcut hint */
    .shortcut-hint {
      font-size: 10px;
      color: #8B8D97;
      text-align: center;
      padding: 0 16px 8px;
    }
    kbd {
      background: #2A2D3A;
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 10px;
      font-family: inherit;
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">
    <div class="logo-mark">K</div>
    <span class="logo-text">Klip4ge</span>
  </div>
  <button class="settings-btn" id="open-options" title="Settings" aria-label="Open settings">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
    </svg>
  </button>
</div>

<!-- Auth wall (shown when not signed in) -->
<div id="auth-wall" style="display:none">
  <div style="font-size:36px;margin-bottom:12px">🔐</div>
  <h2>Sign in to save</h2>
  <p>Sign in to your Klip4ge account to start saving pages, deals, recipes, and more.</p>
  <button class="btn-primary" id="sign-in-btn">Sign in to Klip4ge</button>
</div>

<!-- User bar -->
<div id="user-bar" style="display:none">
  <span id="user-email-display"></span>
  <button class="sign-out" id="sign-out-btn">Sign out</button>
</div>

<!-- Save form -->
<form id="save-form" style="display:none" novalidate>
  <!-- Thumbnail preview -->
  <div id="thumb-wrap"><img id="thumb-img" alt="" /></div>

  <div class="field">
    <label for="title-input">Title</label>
    <input id="title-input" type="text" placeholder="Page title" maxlength="200" required />
  </div>

  <div class="field">
    <label for="url-input">URL</label>
    <input id="url-input" type="url" placeholder="https://..." required />
  </div>

  <div class="field">
    <label for="desc-input">Note (optional)</label>
    <textarea id="desc-input" placeholder="Add a note about this save…"></textarea>
  </div>

  <div class="field">
    <label for="category-select">Category</label>
    <select id="category-select">
      <option value="article">📄 Article</option>
      <option value="deal">🏷️ Deal</option>
      <option value="recipe">🍳 Recipe</option>
      <option value="product">🛍️ Product</option>
      <option value="event">🎟️ Event</option>
      <option value="travel">✈️ Travel</option>
      <option value="gift_idea">🎁 Gift Idea</option>
      <option value="other">📦 Other</option>
    </select>
  </div>

  <!-- Suggested tags from page -->
  <div id="tags-section" style="display:none" class="field">
    <label>Suggested tags</label>
    <div class="tags-row" id="tags-row"></div>
  </div>

  <button type="submit" class="btn-primary" id="save-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
    Save to Klip4ge
  </button>
</form>

<!-- Status bar -->
<div id="status" role="status" aria-live="polite"></div>

<!-- Shortcut hint -->
<div class="shortcut-hint">
  Quick save: <kbd>Alt+S</kbd> on any page
</div>

<!-- Footer -->
<div class="footer">
  <a href="https://klip4ge.app/saves" target="_blank" rel="noopener">Open vault →</a>
  <a href="https://klip4ge.app/privacy" target="_blank" rel="noopener">Privacy</a>
</div>

<script src="popup.js"></script>
</body>
</html>
