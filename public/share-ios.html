<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Saving to ClipForge…</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0F1117;
      color: #E8E8ED;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .logo { width: 72px; height: 72px; margin-bottom: 20px; border-radius: 18px; }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; }
    p  { font-size: 0.95rem; color: #8B8D97; margin-bottom: 24px; max-width: 300px; }
    .btn {
      display: inline-block;
      padding: 16px 32px;
      border-radius: 14px;
      background: linear-gradient(135deg, #00BFFF, #9370DB);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 700;
      text-decoration: none;
      min-height: 56px;
      line-height: 1;
    }
    .note { font-size: 0.78rem; color: #8B8D97; margin-top: 16px; }
  </style>
</head>
<body>
  <img src="/icons/icon-192.png" alt="ClipForge" class="logo" />
  <h1>Open ClipForge to Save</h1>
  <p id="msg">Tap below to open ClipForge and save this page to your vault.</p>
  <a id="deeplink" class="btn" href="/">Open ClipForge →</a>
  <p class="note">iOS Safari: tap Share → Add to Home Screen first for best experience.</p>

  <script>
    // Grab query params passed by the browser's Share Sheet (iOS 16+ PWA share)
    const params = new URLSearchParams(window.location.search);
    const title  = params.get("title") || document.title || "";
    const url    = params.get("url")   || params.get("text") || "";

    if (url || title) {
      document.getElementById("msg").textContent =
        `Ready to save: "${title || url}"`;
    }

    // Build deep-link into the app
    const dest = "/share-target?title=" + encodeURIComponent(title) + "&url=" + encodeURIComponent(url);
    document.getElementById("deeplink").href = dest;

    // Auto-redirect after short delay
    setTimeout(() => { window.location.href = dest; }, 900);
  </script>
</body>
</html>
