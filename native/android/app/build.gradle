/**
 * build.gradle — Klip4ge Android App Module
 * ──────────────────────────────────────────
 * This is a REFERENCE build.gradle for the Capacitor Android project.
 * After running `npx cap add android`, use this as a guide to configure
 * the actual android/app/build.gradle generated by Capacitor.
 *
 * Key settings:
 *   - applicationId matches capacitor.config.ts appId
 *   - minSdk 22 (Android 5.1+) for broad coverage
 *   - targetSdk 34 (Android 14) for Play Store compliance
 *   - Capacitor and plugin dependencies
 */

apply plugin: 'com.android.application'

android {
    namespace 'app.klip4ge.app'
    compileSdk 34

    defaultConfig {
        applicationId "app.klip4ge.app"
        minSdk 22
        targetSdk 34
        versionCode 11        // Increment for each Play Store release
        versionName "1.1.0"   // Match extension / app version

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            // Add signing config before production release:
            // signingConfig signingConfigs.release
        }
        debug {
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
            // Allow WebContents debugging in dev builds
            manifestPlaceholders = [webContentsDebuggingEnabled: "true"]
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    // Capacitor core
    implementation project(':capacitor-android')

    // ── Capacitor plugins ───────────────────────────────────────────────────
    // Install via: npm install @capacitor/app @capacitor/browser etc.
    // Then: npx cap sync
    implementation 'com.capacitorjs.plugins:app:1.1.1'
    implementation 'com.capacitorjs.plugins:browser:1.0.8'
    implementation 'com.capacitorjs.plugins:haptics:1.2.0'
    implementation 'com.capacitorjs.plugins:keyboard:1.2.2'
    implementation 'com.capacitorjs.plugins:local-notifications:1.1.0'
    implementation 'com.capacitorjs.plugins:network:5.0.0'
    implementation 'com.capacitorjs.plugins:preferences:1.2.2'
    implementation 'com.capacitorjs.plugins:push-notifications:1.1.2'
    implementation 'com.capacitorjs.plugins:share:1.2.0'
    implementation 'com.capacitorjs.plugins:splash-screen:4.2.0'
    implementation 'com.capacitorjs.plugins:status-bar:1.1.1'

    // Background fetch (transistor software)
    // implementation 'com.transistorsoft:capacitor-background-fetch:+'

    // In-App Browser (community plugin)
    // implementation 'io.github.capacitor-community:inappbrowser:+'

    // AndroidX
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.work:work-runtime:2.9.0'
}
